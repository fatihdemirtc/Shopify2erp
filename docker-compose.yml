version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/ShopifyErpSync.Api/Dockerfile
    ports:
      - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=db;Database=ShopifyErpSync;User=sa;Password=Strong_P@ss123;TrustServerCertificate=true
      - Shopify__WebhookSecret=${SHOPIFY_WEBHOOK_SECRET:-dev-webhook-secret-change-in-production}
      - Slack__WebhookUrl=${SLACK_WEBHOOK_URL:-}
      - Erp__Adapter=Sql
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: src/ShopifyErpSync.Dashboard/Dockerfile
    ports:
      - "5011:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=db;Database=ShopifyErpSync;User=sa;Password=Strong_P@ss123;TrustServerCertificate=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Strong_P@ss123
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Strong_P@ss123 -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  mssql-data:
